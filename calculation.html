<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Руслан Гадаев | ЦЕНЫ</title>

    <!-- ФАВИКОНЫ -->
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="manifest" href="/favicon/site.webmanifest">
    <meta name="theme-color" content="#050505" id="theme-color-meta">

    <style>
        :root {
            /* ТЕМНАЯ ТЕМА */
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sec: #666666;
            --btn-bg: rgba(40, 40, 40, 0.6);
            --btn-border: rgba(255,255,255,0.1);
            --btn-text: #e0e0e0;
            --logo-filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            --toggle-bg: #333;
            --toggle-circle: #fff;
            
            --tab-bg: rgba(30, 30, 30, 0.85);
            --tab-border: rgba(255,255,255,0.08);
            --tab-text: #888888;
            --tab-text-active: #ffffff;
            --tab-bg-active: rgba(255,255,255,0.15);
            --tab-hover: rgba(255,255,255,0.05);
            
            --icon-tg: rgba(42, 171, 238, 0.4); /* БОЛЕЕ ПРОЗРАЧНЫЙ */
            --icon-phone: rgba(52, 199, 89, 0.4); /* БОЛЕЕ ПРОЗРАЧНЫЙ */
            --icon-mail: rgba(255, 149, 0, 0.4); /* БОЛЕЕ ПРОЗРАЧНЫЙ */
}
        
        /* СВЕТЛАЯ ТЕМА */
        body.light-mode {
            --bg-color: #F2F2F7;
            --text-main: #000000;
            --text-sec: #8E8E93;
            --btn-bg: rgba(255, 255, 255, 0.6);
            --btn-border: rgba(0,0,0,0.1);
            --btn-text: #000000;
            --logo-filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
            --toggle-bg: #e5e5ea;
            --toggle-circle: #ffffff;

            --tab-bg: rgba(255, 255, 255, 0.9);
            --tab-border: rgba(0,0,0,0.05);
            --tab-text: #888888;
            --tab-text-active: #000000;
            --tab-bg-active: rgba(0,0,0,0.08);
            --tab-hover: rgba(0,0,0,0.03);
            
            --icon-tg: rgba(42, 171, 238, 0.5); /* БОЛЕЕ ПРОЗРАЧНЫЙ */
            --icon-phone: rgba(52, 199, 89, 0.5); /* БОЛЕЕ ПРОЗРАЧНЫЙ */
            --icon-mail: rgba(255, 149, 0, 0.5); /* БОЛЕЕ ПРОЗРАЧНЫЙ */
        }

        body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text-main);
}
        /* НИЖНЯЯ ПАНЕЛЬ ВКЛАДОК */
        .tab-bar { 
            position: fixed; 
            bottom: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            height: 35px; 
            max-width: 340px; 
            width: 100%; 
            background: var(--tab-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px; 
            border: 1px solid var(--tab-border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
            margin-bottom: env(safe-area-inset-bottom);
            pointer-events: auto; 
            transition: background-color 0.3s ease, border-color 0.3s ease;
            padding: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            gap: 0px;
        }

        .tab-link {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tab-text);
            font-size: 13px; 
            font-weight: 400; 
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 10px; 
            transition: all 0.25s cubic-bezier(0.4, 0.0, 0.2, 1);
            pointer-events: auto;
            cursor: pointer;
            padding: 0 6px;
            letter-spacing: 0.6px;
            white-space: nowrap; 
        }

        .tab-link.active {
            color: var(--tab-text-active);
            background: var(--tab-bg-active);
            font-weight: 500; 
        }

        @media (hover: hover) {
            .tab-link:hover {
                background: var(--tab-hover);
                color: var(--tab-text-active);
            }
        }
        .tab-link:active {
            transform: scale(0.95);
            background: var(--tab-bg-active);
        }
    </style>
</head>
<body>
    <!-- ПАНЕЛЬ ВКЛАДОК -->
    <div class="tab-bar" id="tabBar">
        <a href="https://gadaev.pro" class="tab-link" id="link-home">Главная</a>
        <a href="https://gadaev.pro/calculation" class="tab-link" id="link-calc">Цены</a>
        <a href="https://gadaev.pro/contact" class="tab-link" id="link-contact">Контакты</a>
    </div>

    <script>
        // АВТО-ОПРЕДЕЛЕНИЕ ТЕМЫ ПРИ ЗАГРУЗКЕ
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                // Если есть сохраненная тема - используем её
                if (savedTheme === 'light') {
                    document.body.classList.add('light-mode');
                }
            } else {
                // Если нет сохраненной - определяем по системе
                const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
                if (prefersLight) {
                    document.body.classList.add('light-mode');
                }
            }
        });

    </script>
</body>
</html>
