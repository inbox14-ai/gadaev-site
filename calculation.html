
                        <!DOCTYPE html>

              <style>
                body {
                  background-color: white; /* Ensure the iframe has a white background */
                }

                /* --- СТИЛИ ДЛЯ БЛОКА УСЛУГ --- */
.service-block {
    background: linear-gradient(145deg, rgba(30,30,30,0.8), rgba(10,10,10,0.9));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px 25px;
    margin-top: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
}

.service-block.visible {
    opacity: 1;
    transform: translateY(0);
}

.service-title {
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 0 0 25px 0;
    color: var(--text-main);
    line-height: 1.3;
    text-align: center;
}

.service-list {
    text-align: left;
    margin-bottom: 30px;
}

.service-item {
    display: flex;
    align-items: flex-start;
    margin-bottom: 15px;
    font-size: 15px;
    color: var(--text-sec);
    line-height: 1.4;
}

.check-icon {
    color: #ffffff;
    font-weight: 700;
    margin-right: 12px;
    min-width: 20px;
    font-size: 16px;
}

body.light-mode .service-block {
    background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(240,240,240,0.95));
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

body.light-mode .check-icon {
    color: #000000;
}

@media (max-width: 768px) {
    .service-title {
        font-size: 19px;
    }
    .service-item {
        font-size: 14px;
    }
}


              </style>
