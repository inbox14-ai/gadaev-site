<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Future City 3D | Gadaev.pro</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(to bottom, #000010, #050510);
        }
        canvas { display: block; }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.6);
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="info">Gadaev.pro | Инженер ПГС</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
    // === СЦЕНА ===
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000010, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(40, 25, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.03;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.maxPolarAngle = Math.PI / 2.2;

    // === ГРУППА ГОРОДА ===
    const cityGroup = new THREE.Group();
    scene.add(cityGroup);

    // === ФУНКЦИЯ СОЗДАНИЯ СПИРАЛЬНОЙ БАШНИ ===
    function createTower(x, z, height, radius, segments, twist, color) {
        const towerGroup = new THREE.Group();
        
        for (let i = 0; i < segments; i++) {
            const y = (i / segments) * height - (height / 2);
            const angle = (i / segments) * twist;
            const floorGroup = new THREE.Group();
            
            // Квадратный контур
            const points = [];
            const halfSize = radius / 2;
            points.push(new THREE.Vector3(-halfSize, 0, -halfSize));
            points.push(new THREE.Vector3(halfSize, 0, -halfSize));
            points.push(new THREE.Vector3(halfSize, 0, halfSize));
            points.push(new THREE.Vector3(-halfSize, 0, halfSize));
            points.push(new THREE.Vector3(-halfSize, 0, -halfSize));
            
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: color,
                transparent: true,
                opacity: 0.7
            });
            const floor = new THREE.Line(geometry, material);
            floor.rotation.y = angle;
            floorGroup.add(floor);
            floorGroup.position.y = y;
            towerGroup.add(floorGroup);
        }
        
        // Вертикальные линии по углам
        const edgeGeo = new THREE.BufferGeometry();
        const edgePoints = [];
        for (let i = 0; i <= segments; i++) {
            const y = (i / segments) * height - (height / 2);
            const angle = (i / segments) * twist;
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            
            // 4 угла
            edgePoints.push(new THREE.Vector3(-radius/2 * cos - radius/2 * sin, y, -radius/2 * -sin + radius/2 * cos));
            edgePoints.push(new THREE.Vector3(radius/2 * cos - radius/2 * sin, y, radius/2 * -sin + radius/2 * cos));
        }
        
        towerGroup.position.set(x, 0, z);
        return towerGroup;
    }

    // === СОЗДАЁМ 5 БАШЕН РАЗНОЙ ВЫСОТЫ ===
    const towers = [];
    
    // Центральная башня (самая высокая)
    const tower1 = createTower(0, 0, 25, 8, 40, Math.PI * 2, 0x00ffff);
    cityGroup.add(tower1);
    towers.push(tower1);

    // 4 башни по углам
    const tower2 = createTower(-15, -15, 18, 6, 35, Math.PI * 1.5, 0x0088ff);
    cityGroup.add(tower2);
    towers.push(tower2);

    const tower3 = createTower(15, -15, 20, 6, 35, Math.PI * 1.5, 0x0088ff);
    cityGroup.add(tower3);
    towers.push(tower3);

    const tower4 = createTower(-15, 15, 16, 5, 30, Math.PI * 1.3, 0x0066cc);
    cityGroup.add(tower4);
    towers.push(tower4);

    const tower5 = createTower(15, 15, 22, 7, 38, Math.PI * 1.7, 0x0088ff);
    cityGroup.add(tower5);
    towers.push(tower5);

    // === СВЕТЯЩИЕСЯ МОСТЫ МЕЖДУ БАШНЯМИ ===
    function createBridge(x1, z1, x2, z2, height, color) {
        const points = [];
        const segments = 20;
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const x = x1 + (x2 - x1) * t;
            const z = z1 + (z2 - z1) * t;
            const y = height + Math.sin(t * Math.PI) * 2; // Арка
            points.push(new THREE.Vector3(x, y, z));
        }
        
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ 
            color: color,
            transparent: true,
            opacity: 0.5
        });
        return new THREE.Line(geometry, material);
    }

    cityGroup.add(createBridge(0, -8, -15, -8, 8, 0x00ffff));
    cityGroup.add(createBridge(0, -8, 15, -8, 8, 0x00ffff));
    cityGroup.add(createBridge(0, 8, -15, 8, 6, 0x0088ff));
    cityGroup.add(createBridge(0, 8, 15, 8, 6, 0x0088ff));

    // === ЧАСТИЦЫ (ПЛАНКТОН/ЭНЕРГИЯ) ===
    const particlesGeo = new THREE.BufferGeometry();
    const particleCount = 2000;
    const positions = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount * 3; i += 3) {
        positions[i] = (Math.random() - 0.5) * 80;
        positions[i + 1] = Math.random() * 40 - 5;
        positions[i + 2] = (Math.random() - 0.5) * 80;
    }
    
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particlesMat = new THREE.PointsMaterial({
        color: 0x00ffff,
        size: 0.15,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // === ПОДСТАВКА ПОД ГОРОД ===
    const platformGeo = new THREE.CylinderGeometry(35, 35, 1, 64);
    const platformMat = new THREE.MeshBasicMaterial({ 
        color: 0x001133,
        transparent: true,
        opacity: 0.3,
        wireframe: true
    });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.position.y = -13;
    cityGroup.add(platform);

    // === BLOOM ЭФФЕКТ ===
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        2.0, 0.5, 0.8
    );
    bloomPass.threshold = 0;
    bloomPass.strength = 2.5;
    bloomPass.radius = 0.7;

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // === АНИМАЦИЯ ===
    let time = 0;
    function animate() {
        requestAnimationFrame(animate);
        time += 0.005;

        // Пульсация башен
        towers.forEach((tower, i) => {
            tower.scale.y = 1 + Math.sin(time + i) * 0.02;
        });

        // Движение частиц
        particles.rotation.y += 0.0005;
        const positions = particles.geometry.attributes.position.array;
        for (let i = 1; i < particleCount * 3; i += 3) {
            positions[i] += Math.sin(time + positions[i-1]) * 0.02;
        }
        particles.geometry.attributes.position.needsUpdate = true;

        controls.update();
        composer.render();
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
