<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Блокировка зума и фиксация -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Руслан Гадаев | Инженер ПГС</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sec: #666666;
            --btn-bg: #111111;
            --btn-border: #333333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            
            overscroll-behavior-y: contain;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 480px; /* Чуть шире для крупных элементов */
            padding: 5px 20px 15px 20px; /* Минимальные отступы сверху и снизу */
            position: relative;
            z-index: 1;
            box-sizing: border-box;
        }
        
        /* Логотип */
        .logo-container {
            position: relative;
            display: inline-block;
            margin: 0 0 5px 0; /* Убрал отступ сверху, снизу всего 5px */
            overflow: hidden;
            border-radius: 50%;
            pointer-events: none;
        }
        .logo {
            width: 180px; /* УВЕЛИЧИЛ до 180px */
            height: auto;
            display: block;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            /* Небольшой сдвиг вверх, если нужно еще плотнее */
            margin-top: -10px; 
        }

        /* Тексты */
        h1 {
            font-size: 30px; /* УВЕЛИЧИЛ */
            font-weight: 700;
            margin: 0 0 5px 0; /* Минимальный отступ */
            letter-spacing: 1.5px;
            text-transform: uppercase;
            line-height: 1.1;
        }
        p.subtitle {
            font-size: 18px; /* УВЕЛИЧИЛ */
            color: var(--text-sec);
            margin: 0 0 25px 0; /* Уменьшил отступ до кнопки */
            font-weight: 400;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        /* ГЛАВНАЯ КНОПКА */
        .btn-main {
            display: inline-block;
            padding: 20px 40px; /* Увеличил высоту кнопки */
            margin-bottom: 30px;
            background-color: var(--btn-bg);
            color: #cccccc;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 300;
            font-size: 17px; /* УВЕЛИЧИЛ */
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--btn-border);
            transition: all 0.2s ease;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            z-index: 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-main:hover {
            background-color: #1a1a1a;
            color: #ffffff;
            border-color: #555555;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05);
        }
        .btn-main:active {
            background-color: #000000;
            border-color: #222222;
            transform: translateY(0); 
        }

        /* БЛОК СВЯЗИ */
        .contact-section {
            margin-top: 5px;
            margin-bottom: 35px;
        }
        .contact-title {
            font-size: 18px; /* УВЕЛИЧИЛ */
            font-weight: 300;
            margin: 0 0 15px 0;
            letter-spacing: 0.5px;
            color: var(--text-main);
            text-transform: none;
        }
        .icons-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }
        .contact-subtitle {
            font-size: 15px; /* УВЕЛИЧИЛ */
            color: #555555;
            margin: 0;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* ИКОНКИ-КНОПКИ */
        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 75px; /* УВЕЛИЧИЛ с 68px */
            height: 75px; /* УВЕЛИЧИЛ с 68px */
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            border-radius: 20px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .icon-btn.phone {
            background: linear-gradient(135deg, #34C759 0%, #30B34E 100%);
        }
        .icon-btn.mail {
            background: linear-gradient(135deg, #FF9500 0%, #E68600 100%);
        }

        .icon-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
        }
        
        .icon-btn:active {
            transform: scale(1.0); 
            filter: brightness(0.9);
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }

        .icon-btn svg {
            width: 38px; /* УВЕЛИЧИЛ иконки внутри */
            height: 38px;
            fill: #ffffff;
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px; /* УВЕЛИЧИЛ */
            color: #444444;
            pointer-events: none;
        }

        /* --- ЭФФЕКТ FLASH --- */
        .flash-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: flash 5s infinite; 
            z-index: 3;
            pointer-events: none;
        }

        @keyframes flash {
            0% { left: -100%; }
            15% { left: 200%; }
            100% { left: 200%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Логотип -->
        <div class="logo-container flash-effect">
            <img src="logo.png" alt="Логотип" class="logo">
        </div>
        
        <!-- Заголовок -->
        <h1>РУСЛАН ГАДАЕВ</h1>
        <p class="subtitle">ИНЖЕНЕР ПГС | ЭКСПЕРТ</p>

        <!-- Кнопка -->
        <a href="contact.vcf" class="btn-main flash-effect" onclick="vibrate(50)">СОХРАНИТЬ КОНТАКТ</a>

        <!-- БЛОК СВЯЗИ -->
        <div class="contact-section">
            <div class="contact-title">Связаться сейчас:</div>
            
            <div class="icons-row">
                <!-- Telegram -->
                <a href="https://t.me/ruslan_gadaev" class="icon-btn flash-effect" target="_blank" onclick="vibrate(30)">
                    <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.911.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.481-.428-.008-1.252-.241-1.865-.44-.751-.244-1.349-.374-1.297-.789.027-.216.324-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.119.098.152.228.166.331.016.116.033.378.018.58z"/></svg>
                </a>

                <!-- Телефон -->
                <a href="tel:+79777075755" class="icon-btn phone flash-effect" onclick="vibrate(30)">
                    <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
                </a>

                <!-- Почта -->
                <a href="mailto:ruslan@gadaev.pro" class="icon-btn mail flash-effect" onclick="vibrate(30)">
                    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                </a>
            </div>

            <p class="contact-subtitle">Выберите удобный способ связи</p>
        </div>

        <div class="footer">
            с 2015 года | Gadaev.pro
        </div>
    </div>

    <script>
        function vibrate(duration) {
            if (navigator.vibrate) {
                navigator.vibrate(duration);
            }
        }
    </script>
</body>
</html>
