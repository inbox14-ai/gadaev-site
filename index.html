<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Руслан Гадаев | Инженер ПГС</title>
    <style>
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }
        .container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Логотип с эффектом */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
            overflow: hidden; /* Чтобы блик не вылезал за края */
            border-radius: 50%;
        }
        .logo {
            width: 100px;
            height: auto;
            display: block;
            border-radius: 50%;
            position: relative;
            z-index: 2;
        }

        /* Тексты */
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 5px 0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        p.subtitle {
            font-size: 13px;
            color: #666666;
            margin: 0 0 40px 0;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* ГЛАВНАЯ КНОПКА (Компактная, капсула) */
        .btn-main {
            display: inline-block; /* Меняем на inline-block, чтобы ширина была по тексту */
            padding: 16px 32px; /* Вертикальный отступ больше, горизонтальный меньше */
            margin-bottom: 40px;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            border-radius: 50px; /* Сильное скругление */
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #333333;
            transition: all 0.3s ease;
            box-sizing: border-box;
            position: relative;
            overflow: hidden; /* Для блика */
            z-index: 1;
        }
        .btn-main:hover {
            background-color: #1a1a1a;
            border-color: #555555;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        /* БЛОК С ИКОНКАМИ */
        .icons-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        /* Стиль иконок-кнопок */
        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden; /* Для блика */
            z-index: 1;
        }
        
        .icon-btn.phone {
            background: linear-gradient(135deg, #34C759 0%, #30B34E 100%);
        }
        .icon-btn.mail {
            background: linear-gradient(135deg, #FF9500 0%, #E68600 100%);
        }

        .icon-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .icon-btn svg {
            width: 30px;
            height: 30px;
            fill: #ffffff;
            position: relative;
            z-index: 2;
        }

        .footer {
            margin-top: 50px;
            font-size: 11px;
            color: #333333;
        }

        /* --- ЭФФЕКТ FLASH (БЛИК) --- */
        .flash-effect::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            animation: flash 3s infinite;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes flash {
            0% { left: -100%; }
            20% { left: 200%; } /* Быстрый пролет */
            100% { left: 200%; } /* Пауза до следующего раза */
        }

    </style>
</head>
<body>

        <div class="footer">

        </div>
    </div>

</body>
</html>
