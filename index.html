<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Теги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-title" content="Гадаев Руслан">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href='data:application/manifest+json,{"name":"Руслан Гадаев","short_name":"Гадаев Руслан","start_url":"/","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"logo.png","sizes":"192x192","type":"image/png"}]}'>

    <title>Руслан Гадаев | Инженер ПГС</title>

    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sec: #666666;
            --nav-bg: rgba(20, 20, 20, 0.85);
            --nav-active: #ffffff;
            --nav-inactive: #555555;
            --level-color: #39FF14; /* Кислотный зеленый */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* КНОПКА ЗАКРЫТЬ */
        .close-btn {
            position: fixed;
            top: calc(20px + env(safe-area-inset-top));
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .close-btn:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.9); }
        .close-btn svg { width: 20px; height: 20px; fill: #ffffff; opacity: 0.7; }

        .slider-container {
            display: flex;
            width: 300vw;
            height: 100vh;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .page {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding-bottom: 80px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
        }
        .page::-webkit-scrollbar { display: none; }

        .container {
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            text-align: center;
            padding-top: 20px;
        }
        
        /* --- ПРОФЕССИОНАЛЬНЫЙ УРОВЕНЬ --- */
        .level-wrapper {
            position: relative;
            width: 280px; /* Ширина под кнопку */
            height: 280px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            background: #111;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,0.9),
                0 0 0 1px #333,
                0 15px 35px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #222;
        }

        /* Шкала с градусами */
        .level-scale {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 1;
            /* Генерируем риски через конический градиент */
            background-image: 
                conic-gradient(from 180deg, 
                    #fff 0deg, #fff 1deg, transparent 1deg, transparent 5deg, /* Главная риска 0 */
                    #666 5deg, #666 6deg, transparent 6deg, transparent 10deg, /* 30 град */
                    #666 10deg, #666 11deg, transparent 11deg, transparent 15deg,
                    #fff 15deg, #fff 16deg, transparent 16deg, transparent 20deg, /* 60 град */
                    #666 20deg, #666 21deg, transparent 21deg, transparent 25deg,
                    #fff 25deg, #fff 26deg, transparent 26deg, transparent 30deg, /* 90 град */
                    #666 30deg, #666 31deg, transparent 31deg, transparent 35deg,
                    #fff 35deg, #fff 36deg, transparent 36deg, transparent 40deg, /* 120 град */
                    #666 40deg, #666 41deg, transparent 41deg, transparent 45deg,
                    #fff 45deg, #fff 46deg, transparent 46deg, transparent 50deg, /* 150 град */
                    #666 50deg, #666 51deg, transparent 51deg, transparent 55deg,
                    #fff 55deg, #fff 56deg, transparent 56deg, transparent 60deg /* 180 град */
                );
            /* Маска, чтобы оставить только внешнее кольцо */
            mask-image: radial-gradient(transparent 55%, black 56%, black 65%, transparent 66%);
            -webkit-mask-image: radial-gradient(transparent 55%, black 56%, black 65%, transparent 66%);
            opacity: 0.6;
        }

        /* Цифры на шкале (упрощенно через псевдоэлементы или SVG, здесь сделаем SVG для точности) */
        .scale-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Жидкость (Зеленый круг) */
        .liquid {
            position: absolute;
            width: 70%; /* Размер внутренней колбы */
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4dff4d, var(--level-color));
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            z-index: 3;
            overflow: hidden; /* Чтобы пузырек не вылетал за пределы жидкости визуально */
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Пузырек воздуха */
        .bubble {
            position: absolute;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #cccccc);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 4;
            top: 50%;
            left: 50%;
            margin-top: -8px;
            margin-left: -8px;
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1); /* Инерция жидкости */
        }

        /* Логотип Р (SVG) поверх всего */
        .logo-svg {
            position: absolute;
            width: 50%;
            height: 50%;
            z-index: 5;
            fill: #ffffff;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        /* Остальные стили */
        h1 { font-size: 22px; font-weight: 700; margin: 0 0 5px 0; letter-spacing: 1.5px; text-transform: uppercase; }
        p.subtitle { font-size: 13px; color: var(--text-sec); margin: 0 0 40px 0; font-weight: 400; letter-spacing: 0.5px; }

        .btn-main {
            display: inline-block;
            padding: 16px 32px;
            margin-bottom: 30px;
            background-color: #111111;
            color: #cccccc;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #333333;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .btn-main:hover { background-color: #1a1a1a; color: #ffffff; border-color: #555555; transform: translateY(-2px); }
        .btn-main:active { background-color: #000000; transform: translateY(0); }

        .contact-section { margin-top: 10px; margin-bottom: 40px; }
        .contact-title { font-size: 13px; font-weight: 300; margin: 0 0 15px 0; color: var(--text-main); text-transform: none; }
        .icons-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
        .contact-subtitle { font-size: 12px; color: #555555; margin: 0; font-weight: 300; }

        .icon-btn {
            display: flex; align-items: center; justify-content: center;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            border-radius: 16px; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .icon-btn.phone { background: linear-gradient(135deg, #34C759 0%, #30B34E 100%); }
        .icon-btn.mail { background: linear-gradient(135deg, #FF9500 0%, #E68600 100%); }
        .icon-btn:hover { transform: scale(1.05); }
        .icon-btn:active { transform: scale(1.0); filter: brightness(0.9); }
        .icon-btn svg { width: 30px; height: 30px; fill: #ffffff; position: relative; z-index: 2; }

        .footer { margin-top: 30px; font-size: 11px; color: #444444; }

        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            cursor: pointer;
            color: var(--nav-inactive);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-item span { font-size: 11px; font-weight: 500; margin-top: 4px; letter-spacing: 0.5px; }
        .tab-icon { width: 6px; height: 6px; background-color: currentColor; border-radius: 50%; transition: all 0.3s ease; }
        .tab-item.active { color: var(--nav-active); }
        .tab-item.active .tab-icon { width: 20px; height: 6px; border-radius: 3px; background-color: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .flash-effect::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: flash 5s infinite; pointer-events: none; z-index: 10;
        }
        @keyframes flash { 0% { left: -100%; } 15% { left: 200%; } 100% { left: 200%; } }
        
        .placeholder-text { color: #333; font-size: 12px; margin-top: 20px; }

        /* Кнопка запроса для iOS */
        #gyro-permission {
            position: fixed;
            bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 3000; display: none;
            flex-direction: column; align-items: center; text-align: center;
            width: 80%; max-width: 300px;
            animation: fadeIn 0.5s ease;
        }
        #gyro-permission.show { display: flex; }
        #gyro-permission p { margin: 0 0 10px 0; font-size: 13px; color: #fff; line-height: 1.4; }
        #gyro-permission button {
            background: #fff; color: #000; border: none;
            padding: 10px 20px; border-radius: 20px;
            font-weight: 600; font-size: 13px; cursor: pointer; width: 100%;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>

    <div class="close-btn" onclick="exitSite()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>

    <div id="gyro-permission">
        <p>📐 <b>Живой уровень:</b><br>Разрешите доступ к датчикам</p>

    <div class="slider-container" id="slider">
        <div class="page" id="page-0">

                <h1>Расчет стоимости</h1>
                <p class="placeholder-text">Калькулятор скоро появится</p>
            </div>
        </div>
        <div class="page active" id="page-2">
            <div class="container">
                
                <!-- УРОВЕНЬ -->
                <div class="level-wrapper">
                    <div class="level-scale"></div>
                    
                    <!-- SVG Шкала с цифрами -->
                    <svg class="scale-numbers" viewBox="0 0 100 100">
                        <text x="50" y="12" font-size="4" fill="#fff" text-anchor="middle" font-family="monospace">0</text>
                        <text x="88" y="52" font-size="4" fill="#fff" text-anchor="middle" font-family="monospace">90</text>
                        <text x="50" y="92" font-size="4" fill="#fff" text-anchor="middle" font-family="monospace">180</text>
                        <text x="12" y="52" font-size="4" fill="#fff" text-anchor="middle" font-family="monospace">270</text>
                        
                        <text x="75" y="25" font-size="3" fill="#888" text-anchor="middle" font-family="monospace">45</text>

                        <text x="25" y="75" font-size="3" fill="#888" text-anchor="middle" font-family="monospace">225</text>
                        <text x="25" y="25" font-size="3" fill="#888" text-anchor="middle" font-family="monospace">315</text>
                    </svg>

                    <div class="liquid">
                        <div class="bubble" id="bubble"></div>
                    </div>
                    
                    <!-- Логотип Р (Контурный) -->
                    <svg class="logo-svg" viewBox="0 0 100 100">
                        <path d="M30,10 L70,10 C85,10 90,25 90,40 C90,55 80,65 65,65 L50,65 L50,90 L30,90 Z M50,30 L50,50 L65,50 C70,50 75,45 75,40 C75,35 70,30 65,30 Z" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
                    </svg>
                </div>

                <h1>РУСЛАН ГАДАЕВ</h1>
                <p class="subtitle">ИНЖЕНЕР ПГС | ЭКСПЕРТ</p>
                
                <a href="contact.vcf" class="btn-main flash-effect" onclick="vibrate(50)">СОХРАНИТЬ КОНТАКТ</a>
                
                <div class="contact-section">
                    <div class="contact-title">Связаться сейчас:</div>

                            <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.911.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.481-.428-.008-1.252-.241-1.865-.44-.751-.244-1.349-.374-1.297-.789.027-.216.324-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.119.098.152.228.166.331.016.116.033.378.018.58z"/></svg>
                        </a>
                        <a href="tel:+79777075755" class="icon-btn phone flash-effect" onclick="vibrate(30)">
                            <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>

                    <p class="contact-subtitle">Выберите удобный способ связи</p>

    <div class="tab-bar">
        <div class="tab-item active" onclick="goToPage(0, this)">
            <div class="tab-icon"></div>
            <span>Главная</span>
        </div>
        <div class="tab-item" onclick="goToPage(1, this)">
            <div class="tab-icon"></div>
            <span>Расчет</span>
        </div>
        <div class="tab-item" onclick="goToPage(2, this)">
            <div class="tab-icon"></div>
            <span>Контакты</span>
        </div>
    </div>

    <script>
        let currentPage = 2; 
        const slider = document.getElementById('slider');
        const tabs = document.querySelectorAll('.tab-item');
        const bubble = document.getElementById('bubble');
        
        window.onload = () => {
            updateSliderPosition();
            initGyro();
        };

        function vibrate(duration) { if (navigator.vibrate) navigator.vibrate(duration); }

        function exitSite() {
            vibrate(30);
            if (window.history.length > 1) window.history.back();
            else {
                document.body.innerHTML = ''; 
                document.body.style.background = '#000';
            }
        }

        function goToPage(index, tabElement) {
            if (index === currentPage) return;
            currentPage = index;
            updateSliderPosition();
            updateTabs(tabElement);
            vibrate(30);
        }

        function updateSliderPosition() { slider.style.transform = `translateX(-${currentPage * 100}vw)`; }
        function updateTabs(activeTab) {
            tabs.forEach(t => t.classList.remove('active'));
            if(activeTab) activeTab.classList.add('active');
            else tabs[currentPage].classList.add('active');
        }

        // --- ГИРОСКОП ДЛЯ УРОВНЯ ---
        function initGyro() {
            if (localStorage.getItem('gyroAllowed') === 'true') {
                startGyro();
            } else {
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                const needsPermission = typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function';
                
                if (isIOS && needsPermission) {
                    setTimeout(() => {
                        document.getElementById('gyro-permission').classList.add('show');
                    }, 1500);
                } else {
                    startGyro();
                }
            }
        }

        function requestGyroAccess() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            localStorage.setItem('gyroAllowed', 'true');
                            document.getElementById('gyro-permission').classList.remove('show');
                            startGyro();
                        } else {
                            document.getElementById('gyro-permission').style.display = 'none';
                        }
                    })
                    .catch(console.error);
            }
        }

        function startGyro() {
            window.addEventListener('deviceorientation', handleOrientation);
        }

        function handleOrientation(event) {
            // gamma: наклон влево/вправо (-90 до 90)
            // beta: наклон вперед/назад (-180 до 180)
            let tiltY = event.gamma; 
            let tiltX = event.beta;

            // Реалистичная физика пузырька
            // Максимальный сдвиг в пикселях (чтобы не упирался в край)
            // Радиус liquid ~70px, радиус bubble ~8px. Оставляем запас.
            const maxMove = 55; 

            // Чувствительность: делим на 30 градусов. 
            // При наклоне 30 град пузырек сдвигается на макс.
            let moveX = (tiltY || 0) / 30 * maxMove;
            let moveY = (tiltX || 0) / 30 * maxMove;

            // Ограничиваем диапазон (clamp), чтобы пузырек не вылетал за пределы жидкости
            moveX = Math.min(Math.max(moveX, -maxMove), maxMove);
            moveY = Math.min(Math.max(moveY, -maxMove), maxMove);

            // Двигаем пузырек
            // При наклоне телефона ВЛЕВО (gamma < 0), пузырек едет ВЛЕВО (-X).
            // При наклоне телефона НА СЕБЯ (beta > 0), пузырек едет ВНИЗ (+Y в CSS, но у нас инверсия для реалистичности).
            // В уровне: если наклоняем верх телефона на себя, пузырек уходит ВНИЗ (от нас).
            
            if (bubble) {
                // Инвертируем Y, так как в CSS положительный Y идет вниз, а пузырек должен "всплывать" вверх относительно наклона
                bubble.style.transform = `translate(${moveX}px, ${-moveY}px)`;
            }
        }

        // Свайпы
        let startX = 0, isDragging = false;
        document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; isDragging = true; }, { passive: true });
        document.addEventListener('touchmove', (e) => { if (!isDragging) return; }, { passive: true });
        document.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) { if (currentPage < 2) goToPage(currentPage + 1, null); }
                else { if (currentPage > 0) goToPage(currentPage - 1, null); }
            }
        });
