<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Руслан Гадаев | Инженер ПГС</title>
    <style>
        body {
            background-color: #111111;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
        }
        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 50%; /* Делает круглую рамку вокруг лого если нужно */
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        p.subtitle {
            font-size: 14px;
            color: #888888;
            margin: 0 0 30px 0;
            font-weight: 400;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px 0;
            margin-bottom: 15px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, background-color 0.2s;
            box-sizing: border-box;
            border: 1px solid #ffffff;
        }
        .btn:hover {
            transform: scale(1.02);
            background-color: #f0f0f0;
        }
        .btn-outline {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #444444;
        }
        .btn-outline:hover {
            border-color: #ffffff;
            background-color: #1a1a1a;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #444444;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Логотип -->
        <img src="logo.png" alt="Логотип Руслан Гадаев" class="logo">
        
        <!-- Заголовок -->
        <h1>Руслан Гадаев</h1>
        <p class="subtitle">Инженер ПГС | Эксперт по приемке</p>

        <!-- Кнопка скачивания контакта (ГЛАВНАЯ) -->
        <!-- Ссылка ведет на файл contact.vcf в той же папке -->
        <a href="contact.vcf" class="btn">💾 Сохранить контакт</a>

        <!-- Дополнительные кнопки -->
        <a href="https://t.me/ruslan_gadaev" class="btn btn-outline">Telegram</a>
        <a href="mailto:ruslan@gadaev.pro" class="btn btn-outline">Написать на почту</a>
        <a href="tel:+79777075755" class="btn btn-outline">Позвонить</a>

        <div class="footer">
            &copy; 2024 Gadaev.pro
        </div>
    </div>

</body>
</html>
