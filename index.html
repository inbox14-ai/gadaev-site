<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Руслан Гадаев | Инженер ПГС</title>
    
    <!-- Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sec: #666666;
            --card-bg: #1c1c1e;
            --price-color: #39FF14;
            --btn-bg-start: #242424; 
            --btn-bg-end: #121212;
            --btn-border: #3a3a3a;
        }
        html, body {
            overflow: hidden; height: 100%; width: 100%; position: fixed;
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; touch-action: none; -webkit-user-select: none; user-select: none;
        }
        .slider-container { display: flex; width: 300vw; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        
        .page { 
            width: 100vw; height: 100%; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            box-sizing: border-box; 
            position: relative; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: 20px;
        }
        .page-no-scroll { overflow: hidden; touch-action: none; }
        .page-scroll { overflow-y: auto; touch-action: pan-y; }
        
        .content-inner { 
            width: 100%; text-align: center; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 0 20px; box-sizing: border-box; 
            height: 100%; position: relative; z-index: 2; 
        }

        /* КОНТЕЙНЕР 3D НА ВЕСЬ ЭКРАН */
        #canvas-container { 
            width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; 
            z-index: 1; outline: none; 
            /* Разрешаем тач для вращения модели */
            touch-action: none; 
        }
        
        .model-btn-container { 
            margin-top: auto; 
            margin-bottom: 80px; /* ЕЩЕ НИЖЕ для безопасности на всех экранах */
            width: 100%; display: flex; justify-content: center; 
            z-index: 2; pointer-events: auto; 
        }

        /* ЛОГОТИП */
        .logo-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 15px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            animation: fadeIn 1s ease-out;
        }
        .logo { width: 100%; height: auto; display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 30px; font-weight: 700; margin: 10px 0 5px; text-transform: uppercase; letter-spacing: 1.5px; }
        p.subtitle { font-size: 18px; color: var(--text-sec); margin: 0 0 25px; text-transform: uppercase; font-weight: 400; letter-spacing: 0.5px; }
        .placeholder { color: #444; font-size: 16px; margin-top: 20px; }
        
        .prices-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .price-card { background-color: var(--card-bg); border-radius: 16px; padding: 20px; text-align: left; border: 1px solid #333; transition: transform 0.2s ease, background-color 0.2s; cursor: pointer; }
        .price-card:active { transform: scale(0.98); background-color: #252527; }
        .price-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .price-title { font-size: 17px; font-weight: 600; color: #fff; margin: 0; }
        .price-value { font-size: 18px; font-weight: 700; color: var(--price-color); white-space: nowrap; margin-left: 10px; }
        .price-desc { font-size: 13px; color: #888; line-height: 1.4; margin: 0; }
        
        /* УНИВЕРСАЛЬНАЯ КНОПКА */
        .btn-main { 
            display: inline-flex; align-items: center; justify-content: center; 
            min-width: 260px; 
            max-width: 90%; 
            padding: 16px 24px; 
            margin: 0 auto; 
            background: linear-gradient(180deg, var(--btn-bg-start), var(--btn-bg-end)); 
            color: #e0e0e0; text-decoration: none; 
            border-radius: 50px; font-weight: 600; font-size: 15px; 
            text-transform: uppercase; border: 1px solid var(--btn-border); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            white-space: nowrap; cursor: pointer; pointer-events: auto; 
            letter-spacing: 1px;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.8; }

        .icons-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .icon-btn { width: 70px; height: 70px; border-radius: 18px; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; pointer-events: auto; }
        .icon-btn.telegram { background: linear-gradient(135deg, #2AABEE, #229ED9); }
        .icon-btn.phone { background: linear-gradient(135deg, #34C759, #30B34E); }
        .icon-btn.mail { background: linear-gradient(135deg, #FF9500, #E68600); }
        .icon-btn svg { width: 36px; height: 36px; fill: #fff; }
        .icon-btn:active { transform: scale(0.95); }
        .contact-subtitle { font-size: 15px; color: #555; }

        /* МЕНЮ ПОЛУПРОЗРАЧНОЕ */
        .tab-bar { 
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; height: 50px; 
            background: rgba(20, 20, 20, 0.6); 
            backdrop-filter: blur(15px); 
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000; margin-top: env(safe-area-inset-top); 
            pointer-events: auto; 
        }
        .tab-item { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; color: #888; font-size: 13px; font-weight: 500; text-transform: uppercase; cursor: pointer; border-radius: 20px; transition: all 0.3s; pointer-events: auto; }
        .tab-item.active { color: #fff; background: rgba(255,255,255,0.15); font-weight: 700; }

        .pulse-effect { animation: pulse-animation 2s infinite ease-in-out; }
        @keyframes pulse-animation { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* ЭКРАН ЗАГРУЗКИ С ТЕКСТОМ И ЦИФРАМИ */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out;
            pointer-events: none; /* Чтобы клики проходили сквозь после исчезновения */
        }
        .loading-text {
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .loading-percent {
            font-size: 40px;
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loading-screen">
        <div class="loading-text">WELCOME TO HOME</div>
        <div class="loading-percent" id="loading-percent">0%</div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab(0)">Главная</div>
        <div class="tab-item" onclick="switchTab(1)">Расчет</div>
        <div class="tab-item" onclick="switchTab(2)">Контакты</div>
    </div>

    <div class="slider-container" id="slider">
        <!-- СТРАНИЦА 1: ГЛАВНАЯ (3D КУБ) -->
        <div class="page page-no-scroll" id="page-0">
            <div class="content-inner">
                <div id="canvas-container"></div>
                <div class="model-btn-container">
                    <a href="#" class="btn-main pulse-effect" onclick="switchTab(1); vibrate(50)">Расчет стоимости</a>
                </div>
            </div>
        </div>

        <!-- СТРАНИЦА 2: РАСЧЕТ (ЗАГЛУШКА) -->
        <div class="page page-scroll" id="page-1">
            <div class="content-inner">
                <h1>Калькулятор</h1>
                <p class="subtitle">Онлайн оценка работ</p>
                
                <div style="margin-top: 40px;">
                    <div class="btn-main" style="opacity: 0.5; cursor: default; transform: none;" onclick="vibrate(30)">
                        Калькулятор расчета стоимости
                    </div>
                    <p class="placeholder" style="margin-top: 30px; font-size: 14px; color: #666;">Раздел в разработке</p>
                </div>
            </div>
        </div>

        <!-- СТРАНИЦА 3: КОНТАКТЫ (С БОЛЬШИМ ОТСТУПОМ СНИЗУ) -->
        <div class="page page-scroll" id="page-2">
            <div class="content-inner" style="padding-bottom: 60px;"> <!-- Добавил отступ снизу -->
                <!-- ЛОГОТИП ФОТО -->
                <div class="logo-container">
                    <img src="logo.png" alt="Логотип Руслан Гадаев" class="logo">
                </div>

                <h1>Руслан Гадаев</h1>
                <p class="subtitle">Инженер ПГС | Эксперт</p>
                
                <!-- Кнопка -->
                <a href="contact.vcf" class="btn-main pulse-effect" onclick="vibrate(50)">Сохранить контакты</a>
                
                <!-- Блок связи -->
                <div style="margin-top: 20px; margin-bottom: 20px;">
                    <div style="color:#fff; font-size:18px; font-weight:300; margin-bottom:25px;">Связаться сейчас:</div>
                    <div class="icons-row">
                        <a href="https://t.me/ruslan_gadaev" class="icon-btn telegram pulse-effect" target="_blank" onclick="vibrate(30)">
                            <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.911.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.481-.428-.008-1.252-.241-1.865-.44-.751-.244-1.349-.374-1.297-.789.027-.216.324-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.119.098.152.228.166.331.016.116.033.378.018.58z"/></svg>
                        </a>
                        <a href="tel:+79777075755" class="icon-btn phone pulse-effect" onclick="vibrate(30)">
                            <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>

                        <a href="mailto:ruslan@gadaev.pro" class="icon-btn mail pulse-effect" onclick="vibrate(30)">
                            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        </a>
                    </div>
                    <p class="contact-subtitle">Выберите удобный способ связи</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- АНИМАЦИЯ ЗАГРУЗКИ С ЦИФРАМИ ---
        window.addEventListener('load', () => {
            const percentEl = document.getElementById('loading-percent');
            const screen = document.getElementById('loading-screen');
            let count = 0;
            
            const interval = setInterval(() => {
                if (count >= 100) {
                    clearInterval(interval);
                    screen.style.opacity = '0';
                    setTimeout(() => {
                        screen.style.display = 'none';
                        init3D(); // Запуск 3D
                    }, 800);
                } else {
                    count++;
                    percentEl.innerText = count + '%';
                }
            }, 20); // Скорость бега цифр
        });

        function init3D() {
            const container = document.getElementById('canvas-container');
            if (!container) return;

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(8, 5, 8); 

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const cubeGroup = new THREE.Group();
            scene.add(cubeGroup);

            const colorCyan = new THREE.Color(0x00ffff);
            const colorPink = new THREE.Color(0xff00ff);
            const colorOrange = new THREE.Color(0xffaa00);

            function createNeonLine(points, color) {
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 1.0, linewidth: 2 });
                const line = new THREE.Line(geometry, material);
                cubeGroup.add(line);
                
                const glowGeo = new THREE.BufferGeometry().setFromPoints(points);
                const glowMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.5 });
                const glow = new THREE.Line(glowGeo, glowMat);
                glow.scale.set(1.1, 1.1, 1.1);
                cubeGroup.add(glow);
            }

            const size = 3;
            const half = size / 2;
            const corners = [
                new THREE.Vector3(-half, -half, -half), new THREE.Vector3(half, -half, -half),
                new THREE.Vector3(half, half, -half), new THREE.Vector3(-half, half, -half),
                new THREE.Vector3(-half, -half, half), new THREE.Vector3(half, -half, half),
                new THREE.Vector3(half, half, half), new THREE.Vector3(-half, half, half)
            ];

            createNeonLine([corners[4], corners[5], corners[6], corners[7], corners[4]], colorCyan);
            createNeonLine([corners[0], corners[1], corners[2], corners[3], corners[0]], colorPink);
            createNeonLine([corners[0], corners[4]], colorCyan);
            createNeonLine([corners[1], corners[5]], colorPink);
            createNeonLine([corners[2], corners[6]], colorCyan);
            createNeonLine([corners[3], corners[7]], colorPink);

            for (let i = 1; i <= 3; i++) {
                const s = size * (0.3 * i);
                const h = s / 2;
                const offset = (i % 2 === 0) ? 0.2 : -0.2;
                const innerCorners = [
                    new THREE.Vector3(-h + offset, -h, -h), new THREE.Vector3(h + offset, -h, -h),
                    new THREE.Vector3(h + offset, h, -h), new THREE.Vector3(-h + offset, h, -h),
                    new THREE.Vector3(-h + offset, -h, h), new THREE.Vector3(h + offset, -h, h),
                    new THREE.Vector3(h + offset, h, h), new THREE.Vector3(-h + offset, h, h)
                ];
                const c = i % 2 === 0 ? colorPink : colorOrange;
                createNeonLine([innerCorners[0], innerCorners[1], innerCorners[2], innerCorners[3]], c);
                createNeonLine([innerCorners[4], innerCorners[5], innerCorners[6], innerCorners[7]], c);
                createNeonLine([innerCorners[0], innerCorners[4]], c);
                createNeonLine([innerCorners[2], innerCorners[6]], c);
            }

            createNeonLine([new THREE.Vector3(-1, -1, -1), new THREE.Vector3(1, 1, 1)], colorCyan);
            createNeonLine([new THREE.Vector3(1, -1, -1), new THREE.Vector3(-1, 1, 1)], colorPink);
            createNeonLine([new THREE.Vector3(-1.5, 0, -1.5), new THREE.Vector3(1.5, 0, 1.5)], colorOrange);

            // Управление камерой (ВРАЩЕНИЕ И ЗУМ РАБОТАЮТ)
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.5;
            controls.enableZoom = true;
            controls.minDistance = 5;
            controls.maxDistance = 20;
            controls.enablePan = false;

            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0;
            bloomPass.strength = 2.5;
            bloomPass.radius = 1.0;

            const composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                composer.render();
            }
            animate();

            window.addEventListener('resize', () => {
                if (container.clientWidth > 0 && container.clientHeight > 0) {
                    camera.aspect = container.clientWidth / container.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(container.clientWidth, container.clientHeight);
                    composer.setSize(container.clientWidth, container.clientHeight);
                }
            });
        }

        let current = 0;
        const slider = document.getElementById('slider');
        const tabs = document.querySelectorAll('.tab-item');
        function switchTab(index) {
            if (index === current) return;
            current = index;
            slider.style.transform = `translateX(-${current * 100}vw)`;
            tabs.forEach((tab, i) => { if (i === current) tab.classList.add('active'); else tab.classList.remove('active'); });
            vibrate(20);
        }
        function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
        let startX = 0;
        document.addEventListener('touchstart', (e) => { if (current === 0) return; startX = e.touches[0].clientX; }, { passive: true });
        document.addEventListener('touchend', (e) => {
            if (current === 0) return;
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && current < 2) switchTab(current + 1);
                if (diff < 0 && current > 0) switchTab(current - 1);
            }
        }, { passive: true });
    </script>
</body>
</html>
