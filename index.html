<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Теги -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-title" content="Гадаев Руслан">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href='data:application/manifest+json,{"name":"Руслан Гадаев","short_name":"Гадаев Руслан","start_url":"/","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"logo.png","sizes":"192x192","type":"image/png"}]}'>

    <title>Руслан Гадаев | Инженер ПГС</title>

    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sec: #666666;
            --nav-bg: rgba(20, 20, 20, 0.85);
            --nav-active: #ffffff;
            --nav-inactive: #555555;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* КНОПКА ЗАКРЫТЬ (КРЕСТИК) */
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
            /* Учитываем безопасную зону сверху для iPhone */
            top: calc(20px + env(safe-area-inset-top)); 
        }
        .close-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
        }
        .close-btn svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            opacity: 0.7;
        }

        .slider-container {
            display: flex;
            width: 300vw;
            height: 100vh;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .page {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding-bottom: 80px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: relative;
        }
        .page::-webkit-scrollbar { display: none; }

        .container {
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            text-align: center;
            padding-top: 20px;
        }
        
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
            overflow: hidden;
            border-radius: 50%;
            pointer-events: none;
        }
        .logo {
            width: 100px;
            height: auto;
            display: block;
            border-radius: 50%;
        }
        h1 { font-size: 22px; font-weight: 700; margin: 0 0 5px 0; letter-spacing: 1.5px; text-transform: uppercase; }
        p.subtitle { font-size: 13px; color: var(--text-sec); margin: 0 0 40px 0; font-weight: 400; letter-spacing: 0.5px; }

        .btn-main {
            display: inline-block;
            padding: 16px 32px;
            margin-bottom: 30px;
            background-color: #111111;
            color: #cccccc;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #333333;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .btn-main:hover { background-color: #1a1a1a; color: #ffffff; border-color: #555555; transform: translateY(-2px); }
        .btn-main:active { background-color: #000000; transform: translateY(0); }

        .contact-section { margin-top: 10px; margin-bottom: 40px; }
        .contact-title { font-size: 13px; font-weight: 300; margin: 0 0 15px 0; color: var(--text-main); text-transform: none; }
        .icons-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 12px; }
        .contact-subtitle { font-size: 12px; color: #555555; margin: 0; font-weight: 300; }

        .icon-btn {
            display: flex; align-items: center; justify-content: center;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            border-radius: 16px; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .icon-btn.phone { background: linear-gradient(135deg, #34C759 0%, #30B34E 100%); }
        .icon-btn.mail { background: linear-gradient(135deg, #FF9500 0%, #E68600 100%); }
        .icon-btn:hover { transform: scale(1.05); }
        .icon-btn:active { transform: scale(1.0); filter: brightness(0.9); }
        .icon-btn svg { width: 30px; height: 30px; fill: #ffffff; position: relative; z-index: 2; }

        .footer { margin-top: 30px; font-size: 11px; color: #444444; }

        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background-color: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            cursor: pointer;
            color: var(--nav-inactive);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-item span { font-size: 11px; font-weight: 500; margin-top: 4px; letter-spacing: 0.5px; }
        .tab-icon { width: 6px; height: 6px; background-color: currentColor; border-radius: 50%; transition: all 0.3s ease; }
        .tab-item.active { color: var(--nav-active); }
        .tab-item.active .tab-icon { width: 20px; height: 6px; border-radius: 3px; background-color: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .flash-effect::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: flash 5s infinite; pointer-events: none; z-index: 10;
        }
        @keyframes flash { 0% { left: -100%; } 15% { left: 200%; } 100% { left: 200%; } }
        
        .placeholder-text { color: #333; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- КНОПКА ЗАКРЫТЬ -->
    <div class="close-btn" onclick="exitSite()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>

    <div class="slider-container" id="slider">
        <div class="page" id="page-0">
            <div class="container">
                <h1>Главная</h1>
                <p class="placeholder-text">Раздел в разработке</p>
            </div>
        </div>
        <div class="page" id="page-1">
            <div class="container">
                <h1>Расчет стоимости</h1>
                <p class="placeholder-text">Калькулятор скоро появится</p>
            </div>
        </div>
        <div class="page active" id="page-2">
            <div class="container">
                <div class="logo-container flash-effect">
                    <img src="logo.png" alt="Логотип" class="logo">
                </div>
                <h1>РУСЛАН ГАДАЕВ</h1>
                <p class="subtitle">ИНЖЕНЕР ПГС | ЭКСПЕРТ</p>
                <a href="contact.vcf" class="btn-main flash-effect" onclick="vibrate(50)">СОХРАНИТЬ КОНТАКТ</a>
                <div class="contact-section">
                    <div class="contact-title">Связаться сейчас:</div>
                    <div class="icons-row">
                        <a href="https://t.me/ruslan_gadaev" class="icon-btn flash-effect" target="_blank" onclick="vibrate(30)">
                            <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.911.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.481-.428-.008-1.252-.241-1.865-.44-.751-.244-1.349-.374-1.297-.789.027-.216.324-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.119.098.152.228.166.331.016.116.033.378.018.58z"/></svg>
                        </a>
                        <a href="tel:+79777075755" class="icon-btn phone flash-effect" onclick="vibrate(30)">
                            <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
                        </a>
                        <a href="mailto:ruslan@gadaev.pro" class="icon-btn mail flash-effect" onclick="vibrate(30)">
                            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        </a>
                    </div>
                    <p class="contact-subtitle">Выберите удобный способ связи</p>
                </div>
                <div class="footer">С 2015 года | Gadaev.pro</div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="goToPage(0, this)">
            <div class="tab-icon"></div>
            <span>Главная</span>
        </div>
        <div class="tab-item" onclick="goToPage(1, this)">
            <div class="tab-icon"></div>
            <span>Расчет</span>
        </div>
        <div class="tab-item" onclick="goToPage(2, this)">
            <div class="tab-icon"></div>
            <span>Контакты</span>
        </div>
    </div>

    <script>
        let currentPage = 2; 
        const slider = document.getElementById('slider');
        const tabs = document.querySelectorAll('.tab-item');
        
        window.onload = () => {
            updateSliderPosition();
        };

        function vibrate(duration) { if (navigator.vibrate) navigator.vibrate(duration); }

        // Функция выхода
        function exitSite() {
            vibrate(30);
            // Пытаемся вернуться назад в истории браузера
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // Если истории нет (открыли напрямую), пробуем закрыть окно (работает редко)
                // Или просто показываем пустую страницу, имитируя выход
                document.body.innerHTML = ''; 
                document.body.style.background = '#000';
                
                // Для PWA (если добавлено на экран) это часто просто сворачивает приложение
                // Так как браузер не дает явно закрыть окно по соображениям безопасности
                if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
                   // В режиме приложения мы просто очищаем экран, пользователь сам свайпом уйдет
                   // Это лучший возможный вариант поведения
                }
            }
        }

        function goToPage(index, tabElement) {
            if (index === currentPage) return;
            currentPage = index;
            updateSliderPosition();
            updateTabs(tabElement);
            vibrate(30);
        }

        function updateSliderPosition() { slider.style.transform = `translateX(-${currentPage * 100}vw)`; }

        function updateTabs(activeTab) {
            tabs.forEach(t => t.classList.remove('active'));
            if(activeTab) activeTab.classList.add('active');
            else tabs[currentPage].classList.add('active');
        }

        let startX = 0, isDragging = false;
        document.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; isDragging = true; }, { passive: true });
        document.addEventListener('touchmove', (e) => { if (!isDragging) return; }, { passive: true });
        document.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) { if (currentPage < 2) goToPage(currentPage + 1, null); }
                else { if (currentPage > 0) goToPage(currentPage - 1, null); }
            }
        });
    </script>
</body>
</html>
